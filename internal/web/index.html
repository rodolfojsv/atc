<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<title>atc</title>
<style>
  :root {
    --bg: #0f1115; --bg2: #161922; --panel: #1b1f29; --panel2: #222735;
    --line: #2c3242; --fg: #e6eaf2; --dim: #8b94a7; --faint: #5c6478;
    --accent: #7aa2f7; --accent-dim: #3a4a73;
    --ok: #9ece6a; --warn: #e0af68; --err: #f7768e;
    --r: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); color: var(--fg);
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior-y: contain; }
  code, .mono, pre, .last, .crumb { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

  header { display: flex; align-items: center; gap: .6em; padding: .65em .9em;
    border-bottom: 1px solid var(--line); position: sticky; top: 0;
    background: rgba(15,17,21,.86); backdrop-filter: blur(8px); z-index: 20; }
  header .logo { font-weight: 700; color: var(--accent); cursor: pointer; letter-spacing: .02em; }
  header .crumb { color: var(--dim); font-size: .82em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  header .spacer { flex: 1; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); display: inline-block; }
  .dot.live { background: var(--ok); box-shadow: 0 0 6px var(--ok); }

  main { padding: .8em; max-width: 860px; margin: 0 auto; padding-bottom: 2em; }

  button { background: var(--panel2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 9px; padding: .5em .9em; font: inherit; font-size: .92em; cursor: pointer;
    transition: background .12s, border-color .12s; }
  button:hover { background: var(--line); }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent-dim); border-color: var(--accent); color: #cdddff; font-weight: 600; }
  button.primary:hover { background: #44588a; }
  .qrwrap { display: flex; justify-content: center; margin: 14px 0; }
  .qrwrap img.qr { background: #fff; padding: 10px; border-radius: 10px; width: 220px; height: 220px; image-rendering: pixelated; }
  .apppanel section { margin-bottom: 22px; }
  .apppanel h3 { margin: 0 0 4px; }
  .apppanel .row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .apppanel .sha { word-break: break-all; font-size: .78em; }
  button.good { border-color: var(--ok); color: var(--ok); }
  button.bad { border-color: var(--err); color: var(--err); }
  button.ghost { background: transparent; }
  button.icon { padding: .5em .6em; }
  button:disabled { opacity: .5; cursor: default; }

  input, textarea, select { background: var(--bg2); color: var(--fg); border: 1px solid var(--line);
    border-radius: 9px; padding: .6em .7em; font: inherit; width: 100%; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: none; min-height: 2.7em; line-height: 1.45; }
  label.fld { display: block; font-size: .78em; color: var(--dim); margin: 0 0 .3em .2em; text-transform: uppercase; letter-spacing: .05em; }
  label.ck { display: inline-flex; gap: .5em; align-items: center; color: var(--fg); font-size: .92em; cursor: pointer;
    background: var(--bg2); border: 1px solid var(--line); border-radius: 9px; padding: .55em .7em; }
  label.ck input { width: auto; accent-color: var(--accent); }

  /* board */
  .toolbar { display: flex; align-items: center; gap: .5em; margin-bottom: .8em; }
  .toolbar h2 { font-size: 1.05em; margin: 0; }
  .toolbar .spacer { flex: 1; }
  .card { position: relative; background: var(--panel); border: 1px solid var(--line); border-radius: var(--r);
    padding: .75em .85em; padding-right: 2.6em; margin-bottom: .6em; cursor: pointer; transition: border-color .12s, transform .08s; }
  .card:hover { border-color: var(--accent-dim); }
  .card:active { transform: scale(.995); }
  .card .top { display: flex; gap: .55em; align-items: center; flex-wrap: wrap; }
  .card .name { color: var(--fg); font-weight: 600; }
  .card .sub { color: var(--dim); font-size: .82em; margin-top: .25em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .last { color: var(--faint); font-size: .82em; margin-top: .35em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .last.alert { color: var(--err); }
  .pill { font-size: .72em; padding: .12em .6em; border-radius: 20px; border: 1px solid var(--line); color: var(--dim); white-space: nowrap; }
  .pill.working { color: var(--warn); border-color: var(--warn); }
  .pill.waiting { color: #fff; background: var(--err); border-color: var(--err); animation: pulse 1.1s infinite; }
  .pill.done { color: var(--ok); border-color: var(--ok); }
  .pill.error, .pill.closed { color: var(--err); border-color: var(--err); }
  .pill.idle, .pill.starting { color: var(--dim); }
  .tag { font-size: .76em; color: var(--faint); }
  /* board grouping + per-card organize chips */
  .section { display: flex; align-items: center; gap: .5em; margin: 1em .2em .45em;
    color: var(--accent); font-size: .76em; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
    cursor: pointer; user-select: none; -webkit-user-select: none; }
  .section:first-child { margin-top: .2em; }
  .section .caret { color: var(--faint); width: .8em; display: inline-block; }
  .section .cnt { color: var(--faint); font-weight: 400; }
  /* Scheduled tasks: a card per schedule, expandable to its run timeline. */
  .sched { background: var(--panel); border: 1px solid var(--line); border-radius: var(--r);
    padding: .55em .7em; margin-bottom: .5em; }
  .sched .head { display: flex; align-items: center; gap: .5em; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .sched .caret { color: var(--faint); width: .8em; display: inline-block; }
  .sched .name { font-weight: 600; }
  .sched .cron { color: var(--dim); font-size: .8em; }
  .sched .next { color: var(--faint); font-size: .78em; margin-left: auto; white-space: nowrap; }
  .sched .runs { margin: .5em 0 .1em; border-left: 2px solid var(--line); padding-left: .7em; }
  .sched .run { display: flex; align-items: baseline; gap: .5em; font-size: .82em; padding: .12em 0; }
  .sched .run .when { color: var(--faint); white-space: nowrap; }
  .sched .run.updated .what { color: var(--ok); cursor: pointer; text-decoration: underline dotted; }
  .sched .run.error .what { color: var(--err); }
  .sched .run.no-update .what { color: var(--dim); }
  .sched .runs .none { color: var(--faint); font-size: .82em; font-style: italic; }
  .badge { font-size: .68em; padding: .05em .45em; border-radius: 20px; border: 1px solid var(--line); color: var(--faint); }
  .badge.warn { color: var(--warn); border-color: var(--warn); }
  .chip { font: inherit; font-size: .72em; padding: .12em .6em; border-radius: 20px; line-height: 1.5;
    border: 1px solid var(--line); background: transparent; color: var(--dim); cursor: pointer; }
  .chip:hover { border-color: var(--accent-dim); }
  .chip.pin.on { color: var(--accent); border-color: var(--accent-dim); }
  /* filter bar: isolate one group */
  .filterbar { display: flex; gap: .4em; overflow-x: auto; padding-bottom: .55em; margin-bottom: .2em;
    -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filterbar::-webkit-scrollbar { display: none; }
  .filterbar:empty { display: none; }
  .fchip { white-space: nowrap; font: inherit; font-size: .8em; padding: .3em .8em; border-radius: 20px;
    border: 1px solid var(--line); background: transparent; color: var(--dim); cursor: pointer; }
  .fchip:hover { border-color: var(--accent-dim); }
  .fchip.on { color: #cdddff; background: var(--accent-dim); border-color: var(--accent); }
  @keyframes pulse { 50% { opacity: .5; } }
  .empty { color: var(--dim); text-align: center; padding: 2.5em 1em; }
  .empty button { margin-top: 1em; }
  /* hold-to-delete ✕ */
  .del { position: absolute; top: 7px; right: 7px; width: 30px; height: 30px; padding: 0;
    border: none; border-radius: 50%; background: transparent; color: var(--faint);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
  .del:hover { color: var(--err); background: rgba(247,118,142,.1); }
  .del.arming { color: var(--err); background: rgba(247,118,142,.14); }
  .del.gone { color: var(--err); }
  .del .xmark { font-size: 14px; line-height: 1; pointer-events: none; }
  .delsvg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); pointer-events: none; }
  .delsvg .ring { fill: none; stroke: var(--err); stroke-width: 2.5;
    stroke-dasharray: 56.5; stroke-dashoffset: 56.5; }
  #spend { color: var(--faint); font-size: .8em; text-align: center; padding: 1.2em 0 .4em; }

  /* new-session sheet */
  .sheet { background: var(--panel); border: 1px solid var(--line); border-radius: var(--r);
    padding: .9em; margin-bottom: 1em; display: grid; gap: .7em; }
  .sheet .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .6em; }
  .sheet h3 { margin: 0; font-size: 1em; }

  /* focus */
  #transcript { display: flex; flex-direction: column; gap: .55em; padding-bottom: .8em; }
  .e { white-space: pre-wrap; word-break: break-word; border-radius: 11px; padding: .55em .8em; font-size: .94em; }
  .e.user { background: linear-gradient(180deg, #233149, #1d2941); border: 1px solid #314970; align-self: flex-end; max-width: 92%; }
  .e.assistant { background: var(--panel); border: 1px solid var(--line); }
  .e.tool { color: var(--dim); font-size: .82em; padding: .15em .8em; }
  .e.system { color: var(--faint); font-size: .82em; padding: .15em .8em; font-style: italic; }
  .e.error { color: var(--err); border: 1px solid #5a2733; background: #2a1820; }
  .e .cursor { color: var(--accent); animation: pulse .9s infinite; }
  .e img.shot { max-width: 180px; max-height: 180px; border-radius: 8px; margin-top: .4em; display: block; border: 1px solid var(--line); }

  #perm { background: linear-gradient(180deg, #3a2330, #2c1a24); border: 1px solid var(--err);
    border-radius: var(--r); padding: .8em; margin: .7em 0; position: sticky; top: 56px; z-index: 10; }
  #perm .q { font-weight: 600; }
  #perm pre { white-space: pre-wrap; word-break: break-word; color: var(--dim); font-size: .82em; margin: .5em 0; max-height: 8em; overflow: auto; }
  #perm .btns { display: flex; gap: .5em; flex-wrap: wrap; }
  /* question options dock onto the composer (chips above the input), not a floating modal */
  #ask { margin: 0 0 .5em; padding: .55em .2em 0; border-top: 1px solid var(--accent-dim); }
  #ask .q { font-weight: 600; margin-bottom: .5em; color: #cdddff; font-size: .9em; }
  #ask .btns { display: flex; gap: .5em; flex-wrap: wrap; }
  #ask .btns button { border-color: var(--accent); color: #cdddff; }
  /* rich layout: when options carry descriptions, stack them full-width with the
     label above its description so the context Claude wrote is readable */
  #ask .btns.rich { flex-direction: column; align-items: stretch; }
  #ask .btns.rich button { display: flex; flex-direction: column; align-items: flex-start;
    gap: .15em; text-align: left; padding: .5em .7em; width: 100%; }
  #ask .btns.rich .ol { font-weight: 600; }
  #ask .btns.rich .od { color: var(--dim); font-size: .82em; font-weight: 400; white-space: normal; }
  /* a toggled multi-select option reads as "checked" until the set is sent */
  #ask .btns button.qopt.sel { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
  #ask .btns button.qopt.sel .ol::before { content: "✓ "; }
  #ask .hint { color: var(--dim); font-size: .8em; margin-top: .4em; }

  /* composer (focus + new) */
  .composer { position: sticky; bottom: 0; background: linear-gradient(180deg, transparent, var(--bg) 22%);
    padding-top: .5em; padding-bottom: max(.6em, env(safe-area-inset-bottom)); }
  /* floats just above the composer when new content arrives while scrolled up */
  .newpill { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: .5em;
    background: var(--accent-dim); color: #cdddff; border: 1px solid var(--accent); border-radius: 20px;
    padding: .35em .9em; font-size: .82em; font-weight: 600; cursor: pointer; white-space: nowrap;
    box-shadow: 0 3px 12px rgba(0,0,0,.45); z-index: 5; }
  .newpill:hover { background: var(--accent); color: #0f1115; }
  .thumbs { display: flex; gap: .5em; flex-wrap: wrap; margin-bottom: .5em; }
  .thumb { position: relative; border: 1px solid var(--line); border-radius: 9px; overflow: hidden;
    background: var(--bg2); display: flex; align-items: center; }
  .thumb img { width: 54px; height: 54px; object-fit: cover; display: block; }
  .thumb .file { padding: .4em .7em; font-size: .8em; color: var(--dim); max-width: 9em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .thumb .x { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.6); color: #fff;
    border-radius: 50%; width: 18px; height: 18px; line-height: 18px; text-align: center; font-size: 12px; cursor: pointer; }
  /* attachments shown inside a sent user message */
  .thumbs.entry { margin: .5em 0 0; }
  .thumbs.entry .thumb { cursor: pointer; }
  .thumbs.entry .thumb.file { padding: .4em .7em; font-size: .8em; color: var(--dim);
    max-width: 12em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-decoration: none; }
  img.attfull { max-width: 100%; max-height: 78vh; display: block; margin: 0 auto; border-radius: 6px; }
  .inputbar { display: flex; gap: .5em; align-items: flex-end;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--r); padding: .5em; }
  .inputbar.drag { border-color: var(--accent); background: var(--panel2); }
  .inputbar textarea { background: transparent; border: none; padding: .35em .3em; max-height: 9em; overflow-y: auto; }
  .inputbar textarea:focus { outline: none; }
  /* "/" command and "@" file completion popup, above the input bar */
  .completion { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    margin-bottom: .4em; overflow: hidden; max-height: 14em; overflow-y: auto; }
  .completion .crow { padding: .5em .7em; cursor: pointer; font-size: .9em; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; border-bottom: 1px solid var(--line); }
  .completion .crow:last-child { border-bottom: none; }
  .completion .crow.sel, .completion .crow:hover { background: var(--accent-dim); color: #cdddff; }
  .completion .crow .cdesc { color: var(--dim); font-size: .92em; }
  .completion .crow.sel .cdesc { color: #aac3ff; }
  .skillrow { padding: .45em .2em; font-size: .85em; color: var(--fg); border-bottom: 1px solid var(--line);
    word-break: break-word; }
  .skillrow:last-child { border-bottom: none; }
  .actions { display: flex; gap: .5em; margin-top: .5em; align-items: center; flex-wrap: wrap; }
  .actions .spacer { flex: 1; }
  .morelist { display: flex; flex-direction: column; gap: .5em; }
  .morelist button { width: 100%; text-align: left; padding: .75em .8em; font-size: 1em; }
  /* cached account-usage badge in the header; tap to refresh (runs /usage) */
  .lim { font-size: .74em; color: var(--dim); border: 1px solid var(--line); border-radius: 20px;
    padding: .12em .6em; cursor: pointer; white-space: nowrap; margin-left: .5em; }
  .lim:hover { border-color: var(--accent); color: #cdddff; }
  .lim.hot { color: var(--err); border-color: var(--err); }
  .limrow { display: flex; align-items: baseline; gap: .6em; padding: .35em 0; border-bottom: 1px solid var(--line); }
  .limrow:last-of-type { border-bottom: 0; }
  .limrow .lw { flex: 1; }
  .limrow b { font-variant-numeric: tabular-nums; }
  .limrow b.hot { color: var(--err); }
  .limrow .lr, .lr { color: var(--dim); font-size: .82em; }
  #stat { color: var(--dim); font-size: .82em; min-height: 1.3em; padding: 0 .2em; }
  #stat.err { color: var(--err); }

  /* modal overlay (diff, link preview) */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.62); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 1em; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: var(--r);
    width: 100%; max-width: 920px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal .mhead { display: flex; align-items: center; gap: .5em; padding: .65em .9em; border-bottom: 1px solid var(--line); }
  .modal .mtitle { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal .mbody { overflow: auto; padding: .6em .9em; }
  .modal .mfoot { display: flex; gap: .5em; justify-content: flex-end; padding: .65em .9em; border-top: 1px solid var(--line); }
  .modal pre.diff { white-space: pre; font-size: .8em; line-height: 1.45; margin: 0; }
  .modal pre.diff .add { color: var(--ok); }
  .modal pre.diff .del { color: var(--err); }
  .modal pre.diff .hunk { color: var(--accent); }
  .modal iframe { width: 100%; height: 68vh; border: 0; background: #fff; border-radius: 8px; }
  .linkurl { word-break: break-all; color: var(--dim); font-size: .82em; margin-bottom: .6em; }
  .modal .hint { color: var(--faint); font-size: .8em; margin-top: .5em; }
  #notifyBtn.on { color: var(--accent); }

  /* rendered markdown in assistant messages */
  .e.assistant.md { line-height: 1.5; }
  .md > :first-child { margin-top: 0; }
  .md > :last-child { margin-bottom: 0; }
  .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 { margin: .7em 0 .35em; line-height: 1.25; }
  .md h1 { font-size: 1.3em; } .md h2 { font-size: 1.18em; } .md h3 { font-size: 1.06em; }
  .md h4, .md h5, .md h6 { font-size: 1em; color: var(--dim); }
  .md p { margin: .5em 0; }
  .md ul, .md ol { margin: .4em 0; padding-left: 1.4em; }
  .md li { margin: .15em 0; }
  .md code { background: var(--bg2); border: 1px solid var(--line); border-radius: 5px; padding: .05em .35em; font-size: .9em; }
  .md pre.code { background: var(--bg2); border: 1px solid var(--line); border-radius: 9px;
    padding: .6em .8em; overflow-x: auto; margin: .5em 0; }
  .md pre.code, .md pre.code * { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .86em; }
  .md blockquote { margin: .5em 0; padding: .1em .9em; border-left: 3px solid var(--line); color: var(--dim); }
  .md hr { border: 0; border-top: 1px solid var(--line); margin: .8em 0; }
  .md a.mdlink { color: var(--accent); text-decoration: underline; cursor: pointer; }
  .md table { border-collapse: collapse; margin: .5em 0; display: block; overflow-x: auto; max-width: 100%; }
  .md th, .md td { border: 1px solid var(--line); padding: .3em .6em; text-align: left; }
  .md th { background: var(--bg2); font-weight: 600; }
  /* clickable file/markdown mentions detected anywhere in a message */
  a.filelink { color: var(--accent); text-decoration: underline dotted; text-underline-offset: 2px; cursor: pointer; }

  /* login */
  #login { max-width: 380px; margin: 16vh auto; display: grid; gap: .8em; padding: 0 1.2em; text-align: center; }
  #login h1 { color: var(--accent); margin: 0; font-size: 1.6em; }
  #login p { color: var(--dim); margin: 0; }
  .hidden { display: none !important; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }
</style>
</head>
<body>
<div id="login" class="hidden">
  <h1>atc</h1>
  <p>Paste the access token printed by <code>atc serve</code>.</p>
  <input id="tokenInput" type="password" placeholder="token" autocomplete="off" autocapitalize="off" spellcheck="false">
  <button class="primary" onclick="saveToken()">Connect</button>
  <p id="loginErr" style="color:var(--err)"></p>
</div>

<div id="app" class="hidden">
  <header>
    <span class="logo" onclick="showBoard()">atc</span>
    <span class="crumb" id="crumb"></span>
    <span class="lim hidden" id="limBadge" onclick="openLimits()"></span>
    <span class="spacer"></span>
    <button id="notifyBtn" class="ghost icon" onclick="toggleNotify()" title="Notify on permission / done">🔔</button>
    <button id="appBtn" class="ghost icon" onclick="openAppPanel()" title="Get the app / pair a device">📱</button>
    <span class="dot" id="live" title="live"></span>
  </header>
  <main>
    <!-- BOARD -->
    <div id="board">
      <div class="toolbar">
        <h2>Sessions</h2>
        <span class="spacer"></span>
        <button class="primary" id="newBtn" onclick="toggleNew()">+ New</button>
      </div>

      <div id="newSheet" class="sheet hidden">
        <h3>New session</h3>
        <div>
          <label class="fld" for="fRepo">Repository</label>
          <select id="fRepo"></select>
        </div>
        <div class="grid2">
          <div>
            <label class="fld" for="fBackend">Backend</label>
            <select id="fBackend"></select>
          </div>
          <div>
            <label class="fld" for="fModel">Model</label>
            <input id="fModel" placeholder="default" autocapitalize="off" spellcheck="false">
          </div>
        </div>
        <div>
          <label class="fld" for="fName">Name <span style="text-transform:none">(optional)</span></label>
          <input id="fName" placeholder="auto" autocapitalize="off" spellcheck="false">

<script>
'use strict';
let token = localStorage.getItem('atc-token') || '';
const q = new URLSearchParams(location.search);
const focusOnLoad = q.get('focus') || ''; // deep link target (e.g. tapped from an ntfy alert)
if (q.get('token') || focusOnLoad) { if (q.get('token')) { token = q.get('token'); localStorage.setItem('atc-token', token); } history.replaceState(null, '', location.pathname); }
const $ = id => document.getElementById(id);
const fileInput = $('fileInput'), formFile = $('formFile');
let current = null, currentAuto = false;
let drafts = {};           // per-session unsent prompt + attachments, kept while the page is open
let attachments = [];      // focus composer queue
let formAttachments = [];  // new-session queue
let pendingFirst = null;   // {name, text, atts} — sent once the session is ready
let timer = null, meta = {};
let histList = [], histIdx = -1, histDraft = ''; // ↑/↓ prompt recall in the focus composer
let curSession = null;     // latest focus session payload (for diff/merge/model)
let comp = null;           // active "/"|"@" completion: {kind, token, items, sel}
let compData = null, compDataFor = null, compFetching = false; // cached completion lists per session
let lastLink = '';         // url backing the link-preview modal's "open in new tab"
let notifyOn = localStorage.getItem('atc-notify') === '1';
let prevStatus = {}, notifySeeded = false; // status transitions for notifications
let swReg = null;          // service-worker registration, backs notifications on Android

// A stable per-device id so the server can tag the sessions THIS device
// started (sessionJSON.createdBy), which is how notifications get scoped to
// "my" sessions. Not a credential — the bearer token is still the gate.
let clientId = localStorage.getItem('atc-client-id');
if (!clientId) {
  clientId = (crypto.randomUUID ? crypto.randomUUID() : 'c-' + Date.now() + '-' + Math.random().toString(16).slice(2));
  localStorage.setItem('atc-client-id', clientId);
}
// A stable per-device ntfy topic so backgrounded push (via the ntfy app)
// reaches THIS phone for the sessions it started. Sent on every request as
// X-Atc-Notify-Topic; the server stamps it on new sessions.
let ntfyTopic = localStorage.getItem('atc-ntfy-topic');
if (!ntfyTopic) {
  const rnd = crypto.randomUUID ? crypto.randomUUID().replace(/-/g, '') : (Date.now().toString(16) + Math.random().toString(16).slice(2));
  ntfyTopic = 'atc-' + rnd.slice(0, 16);
  localStorage.setItem('atc-ntfy-topic', ntfyTopic);
}
let ntfyCfg = { enabled: false, server: '', topic: '' }; // filled from /api/meta
// The topic the phone subscribes to: the server's stable default topic when
// configured (catches every session), else this device's own topic.
function subTopic() { return ntfyCfg.topic || ntfyTopic; }

// Sessions this device is watching even though it didn't start them (name set).
let watchSet = new Set(JSON.parse(localStorage.getItem('atc-watch') || '[]'));
function saveWatch() { localStorage.setItem('atc-watch', JSON.stringify([...watchSet])); }
// Sessions this device explicitly silenced (unchecked "notify" at creation),
// even though it started them — lets the new-session checkbox opt out.
let mutedSet = new Set(JSON.parse(localStorage.getItem('atc-muted') || '[]'));
function saveMuted() { localStorage.setItem('atc-muted', JSON.stringify([...mutedSet])); }
// True when this device should be alerted about a session: I started it (and
// didn't mute it), or I'm explicitly watching it.
function mine(s) { return ((s.createdBy && s.createdBy === clientId) || watchSet.has(s.name)) && !mutedSet.has(s.name); }

function api(path, opts = {}) {
  opts.headers = Object.assign({ 'Authorization': 'Bearer ' + token, 'X-Atc-Client': clientId, 'X-Atc-Notify-Topic': ntfyTopic }, opts.headers || {});
  return fetch(path, opts).then(async r => {
    if (r.status === 401) { showLogin('wrong or missing token'); throw new Error('unauthorized'); }
    const body = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(body.error || r.statusText);
    return body;
  });
}
function esc(s) { const d = document.createElement('span'); d.textContent = s == null ? '' : s; return d.innerHTML; }
function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }
// jsArg makes a value safe to drop inside a single-quoted JS string that
// itself lives in a double-quoted HTML attribute (e.g. onclick="fn('…')").
// Escapes JS string-breakers first, then HTML attribute-breakers — so
// session names with ' or " can't break the handler.
function jsArg(s) { return escAttr(String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'")); }
function live(on) { $('live').classList.toggle('live', on); }

// ---- modal overlay (diff, link preview) ----
function modalOpen() { return !$('overlay').classList.contains('hidden'); }
function openModal(title, bodyHTML, footHTML) {
  $('modal').innerHTML =
    `<div class="mhead"><span class="mtitle">${esc(title)}</span>` +
    `<button class="ghost icon" onclick="closeModal()" title="close">✕</button></div>` +

}
function closeModal() { $('overlay').classList.add('hidden'); $('modal').innerHTML = ''; }

// ---- "App" panel: pair a device, and download the APK once one is built ----
// QR codes are rendered server-side (/api/app/qr) so the page keeps zero JS
// deps. The QR <img> authenticates via ?token= since it can't send a header.
function qrImg(data, alt) {

  return `<img class="qr" alt="${escAttr(alt)}" src="${escAttr(src)}" width="220" height="220">`;
}
// Background push: subscribe the off-the-shelf ntfy app to this device's
// topic. atc pushes a session's alerts to the topic of whoever started it.
function ntfySection() {
  if (!ntfyCfg.enabled || !ntfyCfg.server) return '';
  const sub = ntfyCfg.server.replace(/\/$/, '') + '/' + subTopic();
  // Two QRs in this panel, clearly labelled: "Android app" (download) and

  return `<section>
    <h3>Phone notifications (ntfy)</h3>
    <p class="dim">Install the <b>ntfy</b> app and scan to subscribe — you'll get backgrounded push alerts for sessions you start. Enable <b>instant delivery</b> on the subscription (this is a self-hosted server, no Google).</p>
    <div class="qrwrap">${qrImg(sub, 'ntfy subscribe QR code')}</div>
    <p class="dim sha mono">${esc(sub)}</p>
    <div class="row">

      <button class="ghost" onclick="ntfyTest(this)">send test</button>
    </div>

}
async function ntfyTest(btn) {

}
async function openAppPanel() {
  // One QR only — the APK download. ntfy (if enabled) is a text-only step.
  openModal('Get the app', `<div class="apppanel">

  </div>`);

    $('apkSection').innerHTML = `
      <h3>Android app</h3>
      <p class="dim">Scan the QR on your phone to download (or tap the button). Then enable “Install unknown apps” for your browser and open the file.</p>
      <div class="qrwrap">${qrImg(dlUrl, 'APK download QR code')}</div>
      <div class="row">
        <button class="primary" onclick="location.href='${jsArg('/api/app/download?token=' + token)}'">Download APK</button>
        <button class="ghost" onclick="navigator.clipboard&&navigator.clipboard.writeText('${jsArg(location.origin + '/?token=' + token)}');this.textContent='link copied ✓'">copy app link</button>
      </div>
      <p class="dim">After installing, open the app and paste the copied link into its "atc link" field.</p>
      <p>Version <b>${esc(info.version)}</b>${size ? ' · ' + esc(size) : ''}</p>

  } catch (e) {
    $('apkSection').innerHTML = `<h3>Android app</h3>
      <p class="dim">No build published yet — set <span class="mono">web.apkPath</span> in config.json and restart atc.</p>`;

}

// ---- minimal, dependency-free markdown (assistant messages) ----
// Everything is HTML-escaped before any tag is produced, and link hrefs
// are scheme-checked, so rendering model output can't inject markup.
function mdEscape(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function safeHref(u) {
  const t = u.trim();
  if (/^(https?:|mailto:)/i.test(t)) return t;          // explicit safe schemes
  if (!/^[a-z][\w+.-]*:/i.test(t)) return t;            // scheme-less = relative/anchor, allow
  return null;                                          // reject javascript:, data:, etc.
}
function mdInline(s) {
  const codes = [];
  s = s.replace(/`([^`]+)`/g, (m, c) => { codes.push(c); return '' + (codes.length - 1) + ''; });
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, text, url) => {
    const h = safeHref(url);
    return h ? `<a href="${escAttr(h)}" class="mdlink">${text}</a>` : m;
  });
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/__([^_]+)__/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, '$1<em>$2</em>');
  s = s.replace(/(^|[^\w_])_([^_\s][^_]*?)_(?![\w])/g, '$1<em>$2</em>');
  return s.replace(/(\d+)/g, (m, i) => `<code>${codes[+i]}</code>`);
}
function renderMarkdown(src) {
  src = String(src).replace(/\r\n?/g, '\n');
  const blocks = [];
  src = src.replace(/```[^\n]*\n?([\s\S]*?)```/g, (m, code) => {
    blocks.push(code.replace(/\n$/, '')); return '' + (blocks.length - 1) + '';
  });
  const out = []; let list = null, para = [];
  const flushPara = () => { if (para.length) { out.push('<p>' + para.map(l => mdInline(mdEscape(l))).join('<br>') + '</p>'); para = []; } };
  const flushList = () => { if (list) { out.push(`<${list.type}>` + list.items.map(it => '<li>' + mdInline(mdEscape(it)) + '</li>').join('') + `</${list.type}>`); list = null; } };
  const lines = src.split('\n');
  const tcells = (line) => { let s = line.trim(); if (s.startsWith('|')) s = s.slice(1); if (s.endsWith('|')) s = s.slice(0, -1); return s.split('|').map(c => c.trim()); };
  const isTSep = (line) => /^\s*\|?\s*:?-{1,}:?\s*(\|\s*:?-{1,}:?\s*)*\|?\s*$/.test(line);
  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    let m = raw.match(/^(\d+)$/);
    if (m) { flushPara(); flushList(); out.push('<pre class="code">' + mdEscape(blocks[+m[1]]) + '</pre>'); continue; }
    if (raw.indexOf('|') !== -1 && i + 1 < lines.length && isTSep(lines[i + 1])) {
      flushPara(); flushList();
      const head = tcells(raw);
      const aligns = tcells(lines[i + 1]).map(c => { const l = c.startsWith(':'), r = c.endsWith(':'); return l && r ? 'center' : r ? 'right' : l ? 'left' : ''; });
      const cell = (c, j, tag) => `<${tag}${aligns[j] ? ` style="text-align:${aligns[j]}"` : ''}>` + mdInline(mdEscape(c || '')) + `</${tag}>`;
      let tbl = '<table><thead><tr>' + head.map((c, j) => cell(c, j, 'th')).join('') + '</tr></thead><tbody>';
      i += 2;
      for (; i < lines.length && lines[i].indexOf('|') !== -1 && lines[i].trim() !== ''; i++) {
        const row = tcells(lines[i]);
        tbl += '<tr>' + head.map((_, j) => cell(row[j], j, 'td')).join('') + '</tr>';
      }
      i--;
      out.push(tbl + '</tbody></table>');
      continue;
    }
    if (/^\s*$/.test(raw)) { flushPara(); flushList(); continue; }
    if (m = raw.match(/^(#{1,6})\s+(.*)$/)) { flushPara(); flushList(); const n = m[1].length; out.push(`<h${n}>` + mdInline(mdEscape(m[2])) + `</h${n}>`); continue; }
    if (/^\s*([-*+])\s+/.test(raw)) { flushPara(); if (!list || list.type !== 'ul') { flushList(); list = { type: 'ul', items: [] }; } list.items.push(raw.replace(/^\s*[-*+]\s+/, '')); continue; }
    if (/^\s*\d+\.\s+/.test(raw)) { flushPara(); if (!list || list.type !== 'ol') { flushList(); list = { type: 'ol', items: [] }; } list.items.push(raw.replace(/^\s*\d+\.\s+/, '')); continue; }
    if (m = raw.match(/^\s*>\s?(.*)$/)) { flushPara(); flushList(); out.push('<blockquote>' + mdInline(mdEscape(m[1])) + '</blockquote>'); continue; }
    if (/^\s*([-*_])\1{2,}\s*$/.test(raw)) { flushPara(); flushList(); out.push('<hr>'); continue; }
    flushList(); para.push(raw);
  }
  flushPara(); flushList();
  return out.join('');
}
// Links open in an in-app modal (iframe + open-in-new-tab fallback) so a
// click never navigates away from the session.
function openLink(url) {
  lastLink = url;
  const http = /^https?:/i.test(url);
  const body = `<div class="linkurl mono">${esc(url)}</div>` +
    (http ? `<iframe src="${escAttr(url)}" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>` +
      `<div class="hint">Some sites block embedding — use “Open in new tab” if it stays blank.</div>` : '');
  openModal('link', body,
    `<button class="ghost" onclick="closeModal()">Close</button>` +
    `<button class="primary" onclick="window.open(lastLink, '_blank', 'noopener')">Open in new tab ↗</button>`);
}

// linkifyFiles turns bare ".md" path mentions in a rendered message into
// clickable links. It walks text nodes only (never inside an existing
// <a>/<code>/<pre>), so it can't double-link or corrupt markup.
//
// A path may use "/" or "\" separators and carry an optional drive ("C:\")
// or root, and inner segments may contain spaces (e.g. "AI-Dev Tools/x.md").
// The first segment can't contain spaces, so a path mid-sentence starts at a
// real path token rather than swallowing the preceding prose words.
const FILE_RE = /(^|[\s(])((?:[A-Za-z]:[\\/]|\/)?[\w.@~+-]+(?:[\\/][\w.@~+-]+(?: +[\w.@~+-]+)*)*\.md)\b/g;
function linkifyFiles(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(n) {
      for (let p = n.parentNode; p && p !== root; p = p.parentNode) {
        const t = p.tagName;
        if (t === 'A' || t === 'CODE' || t === 'PRE') return NodeFilter.FILTER_REJECT;
      }
      FILE_RE.lastIndex = 0;
      return FILE_RE.test(n.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    }
  });
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  for (const node of nodes) {
    const text = node.nodeValue;
    const frag = document.createDocumentFragment();
    let last = 0, m; FILE_RE.lastIndex = 0;
    while ((m = FILE_RE.exec(text))) {
      const start = m.index + m[1].length;
      frag.appendChild(document.createTextNode(text.slice(last, start)));
      const a = document.createElement('a');
      a.className = 'filelink'; a.textContent = m[2]; a.dataset.path = m[2];
      frag.appendChild(a);
      last = start + m[2].length;
    }
    frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
}
// Clicking a file mention fetches it (scoped to the session dir) and shows
// it in the modal — markdown rendered, anything else as plain code.
async function openFile(path) {
  try {
    const r = await api('/api/sessions/' + encodeURIComponent(current) + '/file?path=' + encodeURIComponent(path));
    const body = r.markdown ? `<div class="md">${renderMarkdown(r.content)}</div>` : `<pre class="code">${mdEscape(r.content)}</pre>`;
    openModal(r.name, body, `<button class="ghost" onclick="closeModal()">Close</button>`);
  } catch (e) { setStat(e.message, true); }
}

// ---- diff / merge / model ----
function colorDiff(text) {
  return mdEscape(text).split('\n').map(l => {
    if (l.startsWith('@@')) return `<span class="hunk">${l}</span>`;
    if (l.startsWith('+')) return `<span class="add">${l}</span>`;
    if (l.startsWith('-')) return `<span class="del">${l}</span>`;
    return l;
  }).join('\n');
}
async function openDiff() {
  if (!current) return;
  try {
    const d = await api('/api/sessions/' + encodeURIComponent(current) + '/diff');
    const wt = !!(curSession && curSession.worktree);
    const base = (curSession || {}).baseBranch || 'base';
    // Worktree sessions diff against their branch point and can merge back.
    // Direct-in-repo sessions show the repo's uncommitted changes (not
    // scoped to this session) and have nothing to merge.
    const note = wt ? '' : `<div class="hint">Uncommitted changes in the repo — this session runs directly in it, so the diff isn't scoped to just this session.</div>`;
    openModal('diff · ' + current, note + `<pre class="diff">${colorDiff(d.diff || '(no changes)')}</pre>`,
      `<button class="ghost" onclick="closeModal()">Close</button>` +
      (wt ? `<button class="primary" onclick="doMerge()">Merge into ${esc(base)}</button>` : ''));
  } catch (e) { setStat(e.message, true); }
}
async function doMerge() {
  const base = (curSession || {}).baseBranch || 'base';
  if (!confirm('Commit all changes in this worktree and merge into ' + base + '?')) return;
  try {
    await api('/api/sessions/' + encodeURIComponent(current) + '/merge', { method: 'POST', body: '{}' });
    closeModal(); setStat('merged into ' + base + ' — kill with worktree removal to clean up'); pollFocus();
  } catch (e) { alert(e.message); }
}
async function switchModel() {
  const m = prompt('Switch model to (e.g. gpt-5, claude-sonnet-4-6):', (curSession || {}).model || '');
  if (m === null || !m.trim()) return;
  try {
    await api('/api/sessions/' + encodeURIComponent(current) + '/model',
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: m.trim() }) });
    pollFocus();
  } catch (e) { setStat(e.message, true); }
}

// ---- notifications: alert when a session needs approval or finishes ----
function reflectNotifyBtn() { $('notifyBtn').classList.toggle('on', notifyOn && ('Notification' in window) && Notification.permission === 'granted'); }
async function toggleNotify() {
  if (!('Notification' in window)) { alert('This browser has no notifications.'); return; }
  if (!notifyOn) {
    const p = Notification.permission === 'granted' ? 'granted' : await Notification.requestPermission();
    if (p !== 'granted') { alert('Notifications blocked in the browser.'); reflectNotifyBtn(); return; }
    notifyOn = true;
    if (!swReg) await registerSW();
    // Fire one immediately so it's obvious the pipeline works — surfaces a
    // muted OS (Do-Not-Disturb / Focus) or blocked browser before you ever
    // wait on a real session.
    fireNotify('atc notifications on', "you'll be alerted when a session needs approval or finishes");
  } else { notifyOn = false; }
  localStorage.setItem('atc-notify', notifyOn ? '1' : '0');
  reflectNotifyBtn();
}
// ---- watch: opt into notifications for a session you didn't start ----
// Sessions you started are watched implicitly (createdBy === clientId), so
// the button reads "yours" there; for others it toggles membership in the
// local watch set.
function reflectWatchBtn(s) {
  const own = !!(s && s.createdBy && s.createdBy === clientId);
  const on = own || (s && watchSet.has(s.name));
  const b = $('watchBtn');
  if (!b) return;
  b.textContent = own ? '🔔 yours' : (on ? '🔔 watching' : 'watch');
  b.title = own ? "you started this — you're notified" : (on ? 'watching — click to stop' : 'notify me about this session');
  b.classList.toggle('good', on);
  b.disabled = own; // can't unwatch your own session
}
function toggleWatch() {
  if (!current) return;
  if (watchSet.has(current)) watchSet.delete(current); else watchSet.add(current);
  saveWatch();
  reflectWatchBtn(curSession);
}

// Register the service worker that backs notifications. Android Chrome
// rejects `new Notification()` outright, so without this the bell only

  let list;

  const seen = {};
  for (const s of list) {
    seen[s.name] = s.status;
    const watching = document.visibilityState === 'visible' && current === s.name;
    if (notifySeeded && !watching && mine(s)) {
      const prev = prevStatus[s.name];
      // 'done' is a resting state entered only when a turn finishes, so any
      // transition into it is a genuine completion — catching it from any
      // prior status (not just 'working') covers turns shorter than the poll.
      if (s.status === 'waiting' && prev && prev !== 'waiting') fireNotify(s.name + ' needs approval', s.pending ? s.pending.summary : 'permission requested');
      else if (s.status === 'done' && prev && prev !== 'done') fireNotify(s.name + ' finished', s.lastLine || '');

    el.textContent = '◔ ' + windowAmount(bind) + ' ' + bind.label + ' · ' + age;
    el.classList.toggle('hot', bind.pct >= 80);

// openLimits shows every usage window (session, weekly, per-model) in a panel.

function openLimits() {

  // to any session's snapshot (account usage is global anyway).
  let L = curSession && curSession.limits;
  if (!L) for (const g of (lastGroups || [])) { const s = (g.sessions || []).find(x => x.limits); if (s) { L = s.limits; break; } }
  if (!L || !L.windows || !L.windows.length) { refreshLimits(); return; }
  const rows = L.windows.map(w =>
    `<div class="limrow"><span class="lw">${esc(w.label)}</span>` +
    `<b class="${w.pct >= 80 ? 'hot' : ''}">${w.max ? esc(w.used.toLocaleString() + ' / ' + w.max.toLocaleString()) : Math.round(w.pct) + '%'}</b>` +
    `<span class="lr">${esc(w.resets || '')}</span></div>`).join('');
  const age = L.ageSec < 90 ? 'just now' : Math.round(L.ageSec / 60) + 'm ago';
  const backend = (curSession || {}).backend;
  const title = backend === 'copilot' ? 'Copilot usage' : 'Claude usage';
  // Claude's reading comes from a manual /usage scrape, so it gets a Refresh

  const foot = `<button class="ghost" onclick="closeModal()">Close</button>` +

  openModal(title, rows + `<div class="lr" style="margin-top:.7em">as of ${age}</div>`, foot);

let holdActive = false;

function setupHold(btn) {
  const name = btn.dataset.name;
  const ring = btn.querySelector('.ring');
  let timer = null;
  const reset = () => {
    if (timer) { clearTimeout(timer); timer = null; }
    holdActive = false;
    btn.classList.remove('arming');
    ring.style.transition = 'none';
    ring.style.strokeDashoffset = '56.5';
  };
  const start = ev => {
    ev.preventDefault(); ev.stopPropagation();
    holdActive = true;
    btn.classList.add('arming');
    // force the empty state, then animate the ring to full over HOLD_MS
    ring.style.transition = 'none';
    ring.style.strokeDashoffset = '56.5';
    void ring.getBoundingClientRect();
    ring.style.transition = `stroke-dashoffset ${HOLD_MS}ms linear`;
    ring.style.strokeDashoffset = '0';
    timer = setTimeout(fire, HOLD_MS);
  };
  const fire = async () => {
    timer = null;
    btn.classList.remove('arming'); btn.classList.add('gone');
    if (navigator.vibrate) navigator.vibrate(30);
    try {
      await api('/api/sessions/' + encodeURIComponent(name) + '/kill',
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ removeWorktree: false }) });
    } catch (e) { /* card stays; next poll reflects reality */ }
    holdActive = false;
    pollBoard();
  };
  btn.addEventListener('pointerdown', start);
  btn.addEventListener('pointerup', reset);
  btn.addEventListener('pointerleave', reset);
  btn.addEventListener('pointercancel', reset);
  btn.addEventListener('click', e => { e.stopPropagation(); e.preventDefault(); });
  btn.addEventListener('contextmenu', e => e.preventDefault());
}

  histList = data.transcript.filter(e => e.kind === 'user').map(e => e.text); // for ↑/↓ prompt recall
  currentAuto = s.autoApprove;
  $('crumb').textContent = `${s.name} · ${s.status}${s.scheduleName ? ' · ⏱ ' + s.scheduleName : ''}${s.model ? ' · ' + s.model : ''}${cost(s) ? ' · ' + cost(s) : ''}`;
  renderLimits(s);

  const html = data.transcript.map(renderEntry).join('');
  if (html !== lastRender) {
    const el = $('transcript');
    const sc = scroller();
    const prevTop = sc.scrollTop;
    const wasFresh = freshOpen;
    const stick = freshOpen || distFromBottom() <= FOLLOW_SLOP;
    el.innerHTML = html; lastRender = html; freshOpen = false;
    linkifyFiles(el); // make .md path mentions clickable (DOM only changes, lastRender stays the string)
    // Only follow new content when already at the bottom. Otherwise leave the
    // reading position untouched — restore it only if the innerHTML swap made the
    // browser clamp scrollTop, so a 1s poll can't fight an active scroll — and
    // surface a "↓ new messages" pill they can tap to catch up on demand.
    // On a fresh open the transcript often carries screenshots that load after this
    // measure, so pin across frames like the pill; while following live output a cheap
    // one-shot is enough (the next poll re-pins) and won't fight a scroll-up gesture.
    if (stick) { if (wasFresh) pinBottom(400); else sc.scrollTop = sc.scrollHeight; $('newpill').classList.add('hidden'); }
    else { if (sc.scrollTop !== prevTop) sc.scrollTop = prevTop; $('newpill').classList.remove('hidden'); }
  }

  // agent question (Copilot ask_user): quick-reply buttons + freeform box
  const ask = $('ask');
  if (s.question) {
    ask.classList.remove('hidden');
    const details = s.question.optionDetails || [];
    const hasDetails = details.some(d => d);
    const multi = s.question.multiSelect === true;
    const opts = (s.question.options || []).map((o, i) => {
      const d = details[i];
      const inner = `<span class="ol">${esc(o)}</span>` + (d ? `<span class="od">${esc(d)}</span>` : '');
      // In multi-select, a tap toggles the row; a separate button submits the set.
      return multi
        ? `<button class="qopt" data-i="${i}" onclick="toggleAskOpt(${i})">${inner}</button>`
        : `<button onclick="answerQuestion(${i})">${inner}</button>`;
    }).join('');
    const submit = multi ? `<div class="btns"><button class="primary" onclick="answerMulti()">Send selected</button></div>` : '';
    const hint = multi
      ? 'Pick one or more, then “Send selected” (or type your answer below).'
      : (s.question.allowFreeform !== false ? 'Tap an option or type your answer below.' : 'Tap an option above.');
    ask.innerHTML = `<div class="q">❓ ${esc(s.question.prompt)}</div>` +
      (opts ? `<div class="btns${hasDetails ? ' rich' : ''}">${opts}</div>` : '') +
      submit +
      `<div class="hint">${hint}</div>`;
    window._askOptions = s.question.options || [];
    window._askMulti = multi;
    window._askSelected = multi ? new Set() : null;
  } else {
    ask.classList.add('hidden');
    window._askOptions = null;
    window._askMulti = false;
    window._askSelected = null;
  }

  const perm = $('perm');
  if (s.pending) {
    perm.classList.remove('hidden');
    perm.innerHTML = `<div class="q">⚠ ${esc(s.pending.summary)}${s.pendingCount > 1 ? ` <span class="tag">(+${s.pendingCount - 1} queued)</span>` : ''}</div>
      ${(s.pending.detail || []).length ? `<pre>${esc(s.pending.detail.join('\n'))}</pre>` : ''}
      <div class="btns">
        <button class="good" onclick="respond('approve')">Approve</button>
        <button onclick="respond('approve-session')">Always</button>
        <button class="bad" onclick="respond('deny')">Deny</button>
      </div>`;
  } else { perm.classList.add('hidden'); }

  // flush a queued first message once the agent is up
  if (pendingFirst && pendingFirst.name === current && isReady(s.status)) {
    if (s.status === 'error') { pendingFirst = null; }
    else { const pf = pendingFirst; pendingFirst = null; sendMessage(pf.text, pf.atts); }
  }
}

function renderEntry(e) {
  if (e.kind === 'user') {
    // Drop the trailing "📎 name, name" line — the attachments render as
    // thumbnails below instead.
    let text = e.text;
    if (e.attachments && e.attachments.length) text = text.replace(/\n📎[^\n]*$/, '');
    let atts = '';
    if (e.attachments && e.attachments.length) {
      // <img>/links can't send the bearer header, so authenticate via ?token=.
      const auth = u => u + '&token=' + encodeURIComponent(token);
      atts = '<div class="thumbs entry">' + e.attachments.map(a => a.isImage
        ? `<a class="thumb attlink" data-url="${esc(auth(a.url))}" title="${esc(a.name)}"><img src="${esc(auth(a.url))}" alt="${esc(a.name)}"></a>`
        : `<a class="thumb attlink file" data-url="${esc(auth(a.url))}" title="${esc(a.name)}">${esc(a.name)}</a>`
      ).join('') + '</div>';
    }
    return `<div class="e user">${esc(text)}${atts}</div>`;
  }
  // Question records carry the prompt + numbered options + a "reply with…"
  // hint (the full form the TUI needs in its transcript). On the web the
  // docked picker already shows the options, so keep only the prompt line here
  // as a concise record rather than repeating the whole thing.
  if (e.kind === 'system' && e.text.startsWith('❓')) {
    return `<div class="e system">${esc(e.text.split('\n')[0])}</div>`;
  }
  const cls = { assistant: 'assistant', tool: 'tool', system: 'system', error: 'error' }[e.kind] || 'system';
  const cursor = e.partial ? '<span class="cursor"> ▍</span>' : '';
  if (e.kind === 'assistant') return `<div class="e assistant md">${renderMarkdown(e.text)}${cursor}</div>`;
  return `<div class="e ${cls}">${esc(e.text)}${cursor}</div>`;
}
// Links and file mentions in the transcript open in the in-app modal,
// never navigating away.
$('transcript').addEventListener('click', e => {
  const att = e.target.closest('a.attlink');
  if (att) {
    e.preventDefault();
    const url = att.dataset.url, name = att.getAttribute('title') || 'attachment';
    if (att.classList.contains('file')) { openLink(url); return; }
    openModal(name, `<img class="attfull" src="${esc(url)}" alt="${esc(name)}">`,
      `<button class="ghost" onclick="closeModal()">Close</button>`);
    return;
  }
  const fl = e.target.closest('a.filelink');
  if (fl) { e.preventDefault(); openFile(fl.dataset.path); return; }
  const a = e.target.closest('a.mdlink');
  if (a) { e.preventDefault(); openLink(a.getAttribute('href')); }
});
function setStat(msg, isErr) { const el = $('stat'); el.textContent = msg || ''; el.className = isErr ? 'err' : ''; }

// answerQuestion sends the chosen option text as the answer (which the
// server routes to the waiting agent question).
function answerQuestion(i) {
  const opts = window._askOptions || [];
  if (i < 0 || i >= opts.length) return;
  $('ask').classList.add('hidden');
  sendMessage(opts[i], []);
}

// Multi-select questions: toggleAskOpt flips a row in/out of the chosen set;
// answerMulti sends the chosen labels (newline-joined) as one answer, which the
// Claude backend toggles into the checkbox picker.
function toggleAskOpt(i) {
  const sel = window._askSelected;
  if (!sel) return;
  if (sel.has(i)) sel.delete(i); else sel.add(i);
  const btn = document.querySelector(`#ask .qopt[data-i="${i}"]`);
  if (btn) btn.classList.toggle('sel', sel.has(i));
}
function answerMulti() {
  const opts = window._askOptions || [];
  const sel = window._askSelected;
  if (!sel || sel.size === 0) return;
  const chosen = [...sel].sort((a, b) => a - b).map(i => opts[i]);
  $('ask').classList.add('hidden');
  sendMessage(chosen.join('\n'), []);
}

async function respond(d) {
  try { await api('/api/sessions/' + encodeURIComponent(current) + '/respond',
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ decision: d }) }); pollFocus(); }
  catch (e) { setStat(e.message, true); }
}
async function postAction(a) {
  try { await api('/api/sessions/' + encodeURIComponent(current) + '/' + a, { method: 'POST', body: '{}' }); }
  catch (e) { setStat(e.message, true); }
}
async function toggleAuto() {
  try { await api('/api/sessions/' + encodeURIComponent(current) + '/auto',
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ on: !currentAuto }) }); pollFocus(); }
  catch (e) { setStat(e.message, true); }
}
// Secondary session actions live behind "⋯" so the bottom bar stays short
// and never needs horizontal scrolling on a phone.
function openMore() {
  const s = curSession || {};
  const own = !!(s.createdBy && s.createdBy === clientId);
  const watching = own || watchSet.has(current);
  openModal('Session · ' + (current || ''), `<div class="morelist">
    <button class="ghost" onclick="closeModal();switchModel()">Switch model…</button>
    <button class="ghost" onclick="closeModal();renameSession()">Rename…</button>

      ? `<button class="ghost good" disabled>🔔 Notifications: on (you started this)</button>`
      : `<button class="ghost${watching ? ' good' : ''}" onclick="toggleWatch();closeModal()">${watching ? '🔔 Watching — tap to stop' : 'Notify me about this session'}</button>`}
    <button class="ghost bad" onclick="closeModal();killSession()">Kill session…</button>
  </div>`, `<button class="ghost" onclick="closeModal()">Close</button>`);
}
// Show the repo's skills, agents, commands, and instruction files. These
// are loaded by the agent itself — skills/agents are model-invoked when
// relevant, "/" commands you type; atc only surfaces what's available.
async function showSkills() {
  let d;
  try {
    d = (compDataFor === current && compData) ? compData
      : await api('/api/sessions/' + encodeURIComponent(current) + '/complete');
    compData = d; compDataFor = current;
  } catch (e) { setStat(e.message, true); return; }
  const items = d.skills || [];
  const body = items.length
    ? '<div>' + items.map(s => `<div class="skillrow">${esc(s)}</div>`).join('') + '</div>'
    : '<div class="hint">No skills, agents, commands, or instruction files found in this repo.</div>';
  openModal('Skills & commands', body, '<button class="ghost" onclick="closeModal()">Close</button>');
}
async function renameSession() {
  const nn = prompt('Rename session:', current);
  if (nn === null || !nn.trim()) return;
  try {
    const r = await api('/api/sessions/' + encodeURIComponent(current) + '/rename',
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: nn.trim() }) });
    if (drafts[current]) { drafts[r.name] = drafts[current]; delete drafts[current]; }
    current = r.name; lastRender = '';
    pollFocus();
  } catch (e) { setStat(e.message, true); }
}
async function killSession() {
  if (!confirm(`Kill “${current}”? Removed from the board, won't resume.`)) return;
  try { await api('/api/sessions/' + encodeURIComponent(current) + '/kill',
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' }); showBoard(); }
  catch (e) { setStat(e.message, true); }
}

// ---- attachments ----
function makeThumb(f, onRemove) {
  const t = document.createElement('span'); t.className = 'thumb';
  if (f.type.startsWith('image/')) {
    const img = document.createElement('img'); img.src = URL.createObjectURL(f); t.appendChild(img);
  } else {
    const s = document.createElement('span'); s.className = 'file'; s.textContent = f.name; t.appendChild(s);
  }
  const x = document.createElement('span'); x.className = 'x'; x.textContent = '✕';
  x.onclick = ev => { ev.stopPropagation(); onRemove(); };
  t.appendChild(x);
  return t;
}
function renderThumbs() {
  const fc = $('formThumbs'); fc.innerHTML = '';
  formAttachments.forEach((f, i) => fc.appendChild(makeThumb(f, () => { formAttachments.splice(i, 1); renderThumbs(); })));
  const tc = $('thumbs'); tc.innerHTML = '';
  attachments.forEach((f, i) => tc.appendChild(makeThumb(f, () => { attachments.splice(i, 1); renderThumbs(); })));
}
fileInput.addEventListener('change', () => { attachments.push(...fileInput.files); fileInput.value = ''; renderThumbs(); });
formFile.addEventListener('change', () => { formAttachments.push(...formFile.files); formFile.value = ''; renderThumbs(); });

function pasteImages(e, into) {
  let got = false;
  for (const item of (e.clipboardData || {}).items || []) {
    if (item.type.startsWith('image/')) {
      const f = item.getAsFile(); const ext = (item.type.split('/')[1] || 'png');
      into.push(new File([f], `pasted-${(into.length + 1)}.${ext}`, { type: item.type })); got = true;
    }
  }
  if (got) { e.preventDefault(); renderThumbs(); }
}
// Catch a pasted image anywhere on the page (not just when the prompt
// box is focused) and route it to whichever composer is open.
document.addEventListener('paste', e => {
  const inFocus = current && !$('focus').classList.contains('hidden');
  const formOpen = !$('newSheet').classList.contains('hidden');
  const into = inFocus ? attachments : (formOpen ? formAttachments : null);
  if (into) pasteImages(e, into);
});

// Esc returns to the board from anywhere in a session — including while
// the message box is focused; the draft is saved and restored on return.
// Left arrow also goes back, but only when not typing (there it moves
// the cursor).
document.addEventListener('keydown', e => {
  if (modalOpen()) { if (e.key === 'Escape') { e.preventDefault(); closeModal(); } return; }
  if (!current || $('focus').classList.contains('hidden')) return;
  const ae = document.activeElement;
  const typing = ae && (ae.tagName === 'TEXTAREA' || ae.tagName === 'INPUT' || ae.tagName === 'SELECT');
  if (e.key === 'Escape') {
    e.preventDefault();
    if (ae && ae.blur) ae.blur();
    showBoard();
  } else if (e.key === 'ArrowLeft' && !typing) {
    e.preventDefault(); showBoard();
  }
});

// drag & drop onto either input bar
function dropZone(barId, into) {
  const bar = $(barId);
  ['dragenter', 'dragover'].forEach(ev => bar.addEventListener(ev, e => { e.preventDefault(); bar.classList.add('drag'); }));
  ['dragleave', 'drop'].forEach(ev => bar.addEventListener(ev, e => { e.preventDefault(); bar.classList.remove('drag'); }));
  bar.addEventListener('drop', e => {
    for (const f of e.dataTransfer.files) if (f.type.startsWith('image/')) into.push(f);
    renderThumbs();
  });
}

// ---- send ----
async function sendMessage(text, atts) {
  const fd = new FormData();
  fd.append('text', text || '');
  for (const f of (atts || [])) fd.append('files', f, f.name);
  setStat('sending…');
  try {
    await api('/api/sessions/' + encodeURIComponent(current) + '/prompt', { method: 'POST', body: fd });
    delete drafts[current]; // sent — nothing left to restore
    setStat(''); pollFocus();
  } catch (e) {
    // session not ready yet — requeue the first message and retry on next poll
    if (/still starting/.test(e.message) && !pendingFirst) { pendingFirst = { name: current, text, atts }; setStat('waiting for agent…'); }
    else setStat('✗ ' + e.message, true);
  }
}
function sendPrompt() {
  const text = $('prompt').value;
  if (!text.trim() && !attachments.length) return;
  const atts = attachments.slice(); attachments = [];
  $('prompt').value = ''; autosize($('prompt')); renderThumbs();
  resetCompletion();
  histIdx = -1; histDraft = '';
  sendMessage(text, atts);
}
function autosize(t) { t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 9 * 16) + 'px'; }
$('prompt').addEventListener('input', e => { autosize(e.target); histIdx = -1; syncCompletion(mainCtx); }); // editing leaves recall mode
$('fPrompt').addEventListener('input', () => syncCompletion(formCtx));

// ---- "/" command + "@" file completion ----
// Lists come from /complete once per session and are filtered locally,
// so typing never hits the network. "/" matches the repo's
// .claude/commands; "@" fuzzy-finds a working-dir file to mention.
function ensureCompData() {
  if (compDataFor === current && compData) return;
  if (compFetching) return;
  compFetching = true;
  api('/api/sessions/' + encodeURIComponent(current) + '/complete')
    .then(d => { compData = d; compDataFor = current; })
    .catch(() => {})
    .finally(() => { compFetching = false; if (current) syncCompletion(mainCtx); });
}
// Completion runs against a context: which textarea, which popup div,
// and where its data comes from. The focus composer uses the running
// session's lists; the new-session form uses the picked repo+backend's
// filesystem lists (no session exists yet).
const mainCtx = {
  get inputEl() { return $('prompt'); },
  get popupEl() { return $('completion'); },
  getData() { ensureCompData(); return compData; },
};
const formCtx = {
  get inputEl() { return $('fPrompt'); },
  get popupEl() { return $('fcompletion'); },
  getData() { ensureFormCompData(); return formCompData; },
};
function hidePopup(el) { el.classList.add('hidden'); el.innerHTML = ''; }
function resetCompletion() { comp = null; hidePopup($('completion')); hidePopup($('fcompletion')); }
function syncCompletion(ctx) {
  comp = null;
  const val = ctx.inputEl.value;
  // Complete the token at the cursor (end of input): a "/command" or
  // "@file" preceded by start-of-line or whitespace — so a slash works
  // mid-prompt or on a later line, not only as the very first character.
  const slash = val && val.match(/(?:^|\s)(\/\S*)$/);
  const at = val && val.match(/(?:^|\s)(@\S*)$/);
  if (slash) {
    const token = slash[1];
    const data = ctx.getData();
    const items = (data && data.commands || [])
      .filter(c => c.name.startsWith(token))
      .map(c => ({ insert: c.name, label: c.name, desc: c.desc }));
    // hide once the only match is exactly what's typed
    if (items.length && !(items.length === 1 && items[0].insert === token)) {
      comp = { kind: '/', token, items, sel: 0, ctx };
    }
  } else if (at) {
    const token = at[1];
    const data = ctx.getData();
    // "@" resolves to a working-dir file OR an inline subagent mention
    // (agent-<name>); both are post-"@" text the accept step re-prefixes.
    const cands = ((data && data.files) || []).concat((data && data.agents) || []);
    // Generous cap so several same-named files all appear; the popup
    // scrolls (CSS max-height) and arrow-nav keeps the selection in view.
    const hits = fuzzyFilter(cands, token.slice(1), 50);
    if (hits.length) comp = { kind: '@', token, items: hits.map(f => ({ insert: f, label: f })), sel: 0, ctx };
  }
  if (!comp) { hidePopup(ctx.popupEl); return; }
  renderComp();
}
function renderComp() {
  if (!comp) return;
  const el = comp.ctx.popupEl;
  if (!comp.items.length) { hidePopup(el); return; }
  el.innerHTML = comp.items.map((it, i) => {
    // Cap description length so long skill blurbs don't blow out the popup width.
    const desc = it.desc && it.desc.length > 60 ? it.desc.slice(0, 59).trimEnd() + '…' : it.desc;
    const body = comp.kind === '/' && desc
      ? esc(it.label) + ' <span class="cdesc">— ' + esc(desc) + '</span>'
      : esc(it.label);
    return `<div class="crow${i === comp.sel ? ' sel' : ''}" onmousedown="event.preventDefault();comp.sel=${i};acceptCompletion()">${body}</div>`;
  }).join('');
  el.classList.remove('hidden');
  // Keep the highlighted row visible as arrow-nav walks a long list.
  const sel = el.querySelector('.crow.sel');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}
function acceptCompletion() {
  if (!comp || !comp.items.length) return;
  const it = comp.items[comp.sel];
  const t = comp.ctx.inputEl, popup = comp.ctx.popupEl;
  const before = t.value.slice(0, t.value.length - comp.token.length);
  // Re-add the "@" for file/agent mentions: the leading "@" is what makes
  // the agent eagerly load a file or hand off to a subagent. ("/" inserts
  // carry their own slash already.)
  const insert = comp.kind === '@' ? '@' + it.insert : it.insert;
  t.value = before + insert + ' ';
  comp = null; hidePopup(popup);
  if (t.id === 'prompt') autosize(t);
  t.focus(); t.setSelectionRange(t.value.length, t.value.length);
}
// The new-session form has no session, so its "/" and "@" lists come
// from a session-less endpoint keyed by the chosen repo + backend.
let formCompData = null, formCompKey = null, formCompFetching = false;
function formRepo() { return $('fRepo').value; }
function ensureFormCompData() {
  const repo = formRepo(); if (!repo) return;
  const backend = $('fBackend').value, key = backend + '\n' + repo;
  if (formCompKey === key && formCompData) return;
  if (formCompFetching) return;
  formCompFetching = true;
  api('/api/complete?dir=' + encodeURIComponent(repo) + '&backend=' + encodeURIComponent(backend))
    .then(d => { formCompData = d; formCompKey = key; })
    .catch(() => {})
    .finally(() => { formCompFetching = false; syncCompletion(formCtx); });
}
// Subsequence fuzzy match, ranked like the TUI: basename hits first,
// then earlier/shorter matches.
function fuzzyFilter(items, query, max) {
  const q = query.toLowerCase();
  const out = [];
  for (const it of items) {
    const pos = subseqAt(it.toLowerCase(), q);
    if (pos < 0) continue;
    let score = -pos - it.length;
    const base = it.split('/').pop().toLowerCase();
    if (q === '' || base.includes(q)) score += 10000;
    out.push({ it, score });
  }
  out.sort((a, b) => b.score - a.score);
  return out.slice(0, max).map(o => o.it);
}
function subseqAt(s, q) {
  if (!q) return 0;
  let first = -1, i = 0;
  for (let p = 0; p < s.length && i < q.length; p++) {
    if (s[p] === q[i]) { if (first === -1) first = p; i++; }
  }
  return i === q.length ? first : -1;
}
// Capture phase on document so this runs before the prompt's history-nav
// and Enter-to-send handlers and can swallow the key while completing.
document.addEventListener('keydown', e => {
  if (!comp || document.activeElement !== comp.ctx.inputEl) return;
  const n = comp.items.length;
  if (e.key === 'ArrowDown') { comp.sel = (comp.sel + 1) % n; renderComp(); }
  else if (e.key === 'ArrowUp') { comp.sel = (comp.sel - 1 + n) % n; renderComp(); }
  else if (e.key === 'Enter' || e.key === 'Tab') { acceptCompletion(); }
  else if (e.key === 'Escape') { const el = comp.ctx.popupEl; comp = null; hidePopup(el); }
  else return;
  e.preventDefault(); e.stopPropagation();
}, true);

// ↑ recalls your previous prompts into the composer (newest first), ↓
// walks back toward what you were typing — so after aborting you can ↑,
// tweak it, and resend without retyping. Only triggers at the text
// edge, so arrows still move the caret within a multi-line draft.
$('prompt').addEventListener('keydown', e => {
  const t = e.target;
  if (e.key === 'ArrowUp') {
    if (t.selectionStart !== 0 || t.selectionEnd !== 0 || !histList.length) return;
    e.preventDefault();
    if (histIdx === -1) { histDraft = t.value; histIdx = histList.length - 1; }
    else if (histIdx > 0) { histIdx--; }
    t.value = histList[histIdx]; autosize(t); t.setSelectionRange(0, 0);
  } else if (e.key === 'ArrowDown') {
    if (histIdx === -1) return;
    const end = t.value.length;
    if (t.selectionStart !== end || t.selectionEnd !== end) return;
    e.preventDefault();
    if (histIdx >= histList.length - 1) { histIdx = -1; t.value = histDraft; }
    else { histIdx++; t.value = histList[histIdx]; }
    autosize(t); t.setSelectionRange(t.value.length, t.value.length);
  }
});

// Enter submits; Ctrl/Cmd/Shift+Enter inserts a newline. (isComposing
// guards IME input so Enter doesn't submit mid-composition.)
function enterToSubmit(t, submit) {
  t.addEventListener('keydown', e => {
    if (e.key !== 'Enter' || e.isComposing) return;
    e.preventDefault();
    if (e.ctrlKey || e.metaKey || e.shiftKey) {
      const a = t.selectionStart, b = t.selectionEnd;
      t.value = t.value.slice(0, a) + '\n' + t.value.slice(b);
      t.selectionStart = t.selectionEnd = a + 1;
      if (t.id === 'prompt') autosize(t);
    } else {
      submit();
    }
  });
}
enterToSubmit($('prompt'), sendPrompt);
enterToSubmit($('fPrompt'), createSession);

// ---- boot ----
async function boot() {
  try {
    meta = await api('/api/meta');
    if (meta.ntfy) ntfyCfg = meta.ntfy;
    $('login').classList.add('hidden'); $('app').classList.remove('hidden');
    const repoOpts = (meta.repos || []).map(r =>
      `<option value="${esc(r)}" ${r === meta.defaultRepo ? 'selected' : ''}>${esc(baseName(r))}</option>`).join('');
    $('fRepo').innerHTML = repoOpts + `<option value="__scratch__">— No repo (scratch) —</option>`;
    $('fBackend').innerHTML = (meta.backends || []).map(b => `<option ${b === meta.defaultBackend ? 'selected' : ''}>${esc(b)}</option>`).join('');
    // Agent picker: only shown when custom agents are configured. "(none)"
    // leaves the backend default agent in charge.
    const agentNames = meta.agents || [];
    if (agentNames.length) {
      $('fAgent').innerHTML = `<option value="">(none)</option>` +
        agentNames.map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join('');
      $('fAgentRow').classList.remove('hidden');
    } else {
      $('fAgentRow').classList.add('hidden');
    }
    if (meta.defaultModel) $('fModel').value = meta.defaultModel;
    $('fAuto').checked = !!meta.defaultAutoApprove;
    dropZone('formBar', formAttachments);
    dropZone('focusBar', attachments);
    registerSW();
    // In the Capacitor app the UI runs inside the shell's iframe, where the
    // in-page bell can't get notification permission anyway — push there comes
    // via ntfy, so hide the bell to avoid a dead/confusing button.
    if (window.self !== window.top) $('notifyBtn').style.display = 'none';
    reflectNotifyBtn();
    if (!notifyTimer) notifyTimer = setInterval(checkNotifications, 4000); // runs in any view
    if (focusOnLoad) openSession(focusOnLoad); else showBoard();
  } catch (e) { showLogin(e.message === 'unauthorized' ? 'wrong or missing token' : ''); }
}
let notifyTimer = null;

// In the Capacitor app the atc UI runs inside the shell's iframe, so the
// hardware Back button is captured by the shell (which has the Capacitor
// bridge) and relayed here as a postMessage. We pop one level of in-app nav
// (modal → new-sheet → session → board) and report whether we handled it; if
// we're already at the board the shell shows its Servers screen.
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || d.type !== 'atc-back') return;
  let handled = true;
  if (modalOpen()) closeModal();
  else if (!$('newSheet').classList.contains('hidden')) toggleNew();
  else if (current) showBoard();
  else handled = false; // at the board root — let the shell take over
  (e.source || window.parent).postMessage({ type: 'atc-back-result', handled }, '*');
});

boot();
</script>
